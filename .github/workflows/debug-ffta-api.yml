name: Debug API FFTA (réponse brute)

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer requests
        run: pip install requests

      - name: Inspecter la réponse brute FFTA
        env:
          FFTA_SESSION_IDENTITE: ${{ secrets.FFTA_SESSION_IDENTITE }}
        run: python debug_ffta.py
